# Cloud Build configuration for automated deployment to Google Cloud Run.
# Trigger: push to main branch or manual trigger.
# Usage: gcloud builds submit --config cloudbuild.yaml .
#
# Required substitutions (set in Cloud Build trigger or command line):
#   _GEMINI_API_KEY — your Gemini API key
#   _REGION        — Cloud Run region (default: us-central1)
#   _SERVICE_NAME  — Cloud Run service name (default: aerobrowser-backend)

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: aerobrowser-backend

steps:
  # Step 1: Install frontend dependencies and build static assets
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd frontend
        npm ci
        npm run build
    id: 'build-frontend'

  # Step 2: Build the Docker image (includes the static frontend from Step 1)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
      - 'backend'
    id: 'build-docker'
    waitFor: ['build-frontend']

  # Step 3: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
    id: 'push-image'
    waitFor: ['build-docker']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=900'
      - '--set-env-vars=GEMINI_API_KEY=${_GEMINI_API_KEY}'
      - '--allow-unauthenticated'
    id: 'deploy'
    waitFor: ['push-image']

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'

options:
  logging: CLOUD_LOGGING_ONLY
